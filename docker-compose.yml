services:
  # ─── Laravel Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: pa_disdukcapil_app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-pa_disdukcapil}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      SESSION_DRIVER: file
      SESSION_SECURE_COOKIE: false
      SESSION_SAME_SITE: lax
      NEO4J_HOST: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jSecret1}
      OCR_SERVICE_URL: http://ocr-service:5001
      OCR_SECRET_KEY: ${OCR_SECRET_KEY}
      QUEUE_CONNECTION: database
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - pa_network

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: pa_disdukcapil_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - pa_network

  # ─── Queue Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: pa_disdukcapil_worker
    restart: unless-stopped
    command: php artisan queue:work --queue=ocr,graph,default --sleep=3 --tries=3 --timeout=120
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-pa_disdukcapil}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      NEO4J_HOST: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jSecret1}
      OCR_SERVICE_URL: http://ocr-service:5001
      OCR_SECRET_KEY: ${OCR_SECRET_KEY}
      QUEUE_CONNECTION: database
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - pa_network

  # ─── OCR Microservice ─────────────────────────────────────────────────────
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: pa_disdukcapil_ocr
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      OCR_SECRET_KEY: ${OCR_SECRET_KEY}
      LOG_LEVEL: INFO
    networks:
      - pa_network

  # ─── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pa_disdukcapil_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-pa_disdukcapil}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD:-secret}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pa_network

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pa_disdukcapil_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pa_network

  # ─── Neo4j 5 ──────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.15
    container_name: pa_disdukcapil_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP browser
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jSecret1}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4jSecret1}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - pa_network

volumes:
  mysql_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  app_storage:

networks:
  pa_network:
    driver: bridge
