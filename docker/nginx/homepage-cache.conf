# Nginx Configuration for Homepage Caching
# Add this to your nginx.conf or docker/nginx/default.conf

# FastCGI cache definition
fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=homecache:10m max_size=100m inactive=60m use_temp_path=off;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

# Cache status in headers
add_header X-Cache-Status $upstream_cache_status;

server {
    listen 80;
    server_name _;

    # Cache homepage for 1 hour
    location = / {
        fastcgi_cache homecache;
        fastcgi_cache_valid 200 1h;
        fastcgi_cache_valid 404 5m;
        fastcgi_ignore_headers Cache-Control;
        
        fastcgi_pass php-upstream;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI /;
        fastcgi_param SCRIPT_NAME /index.php;
        
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache other static pages
    location ~ ^/(berita|tentang|dashboard)$ {
        fastcgi_cache homecache;
        fastcgi_cache_valid 200 1h;
        fastcgi_cache_valid 302 5m;
        
        fastcgi_pass php-upstream;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }

    # Bypass cache for API and auth endpoints
    location ~ ^/(api/|auth/|dashboard/upload) {
        fastcgi_pass php-upstream;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }
}
